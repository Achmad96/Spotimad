<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotimad</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="container">
        <div class="rename-wrapper" style="display: none;">
            <p>Please enter the new name</p>
            <input type="text">
            <div class="buttons">
                <input id="close-btn" type="button" value="close">
                <input id="submit-btn" type="button" value="submit">
            </div>
        </div>
        <div class="wrapper">
            <p>Spotimad</p>
            <ul class="songs"></ul>
            <div class="buttons">
                <audio controls></audio>
                <input type="button" id='loop-btn' value="Loop">
                <label for="add-btn"> Add song
                    <input type="file" id="add-btn">
                </label>
            </div>
        </div>
    </div>
    
    <div class="content-wrapper" style="display: none;">
        <ul class="items">
            <li><span id="rename">Rename</span></li>
            <li><span id="delete">Delete</span></li>
        </ul>
    </div>

    <script src="script/index.js"></script>
</body>
</html>
